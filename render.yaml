services:
  - type: web
    name: propedge-v2
    runtime: node
    region: oregon
    plan: free
    branch: main
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: npm_config_ignore_scripts
        value: "false"
